<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-800, initial-scale=1.0">
  <title>Gravity Quadrant - 极简连续态效能中枢</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/echarts@5.5.0/dist/echarts.min.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;800&display=swap" rel="stylesheet">
  <script>
    tailwind.config = {
      theme: { extend: { fontFamily: { sans: ['Inter', 'sans-serif'] }, colors: { brand: '#0066FF' } } }
    }
  </script>
  <style>
    .tracking-tight-custom { letter-spacing: -0.04em; }
    ::-webkit-scrollbar { width: 4px; height: 4px; }
    ::-webkit-scrollbar-thumb { background: #E5E5E5; border-radius: 2px; }
    ::-webkit-scrollbar-track { background: transparent; }
  </style>
</head>
<body class="bg-white text-[#111] font-sans antialiased min-h-screen flex flex-col justify-between selection:bg-brand selection:text-white">

  <header class="max-w-7xl mx-auto w-full px-6 py-6 flex justify-between items-center" data-tauri-drag-region>
    <div class="flex items-center gap-3" data-tauri-drag-region>
      <span class="text-2xl font-extrabold tracking-tighter italic bg-black text-white w-9 h-9 flex items-center justify-center rounded-xl pointer-events-none">G</span>
      <span class="font-bold tracking-tight text-lg pointer-events-none">Gravity.</span>
    </div>
    <div class="flex items-center gap-4 text-sm font-medium text-[#666]">
      <span class="flex items-center gap-1.5 bg-[#F4F4F4] px-3 py-1 rounded-full text-xs">
        <span class="w-2 h-2 rounded-full bg-emerald-500 animate-pulse"></span> 隐匿守候: ⌥+Space
      </span>
    </div>
  </header>

  <main class="max-w-7xl mx-auto px-6 py-6 flex flex-col items-center text-center flex-grow w-full">
    <h1 class="text-5xl md:text-7xl font-extrabold tracking-tight-custom leading-[0.95] mb-4">Intent to Orbit.</h1>
    <p class="text-[#666] text-base md:text-lg font-normal max-w-xl mb-8">输入极度混乱的日常口语流水账，AI 自动完成解耦、降维与连续态坐标系引力落盘。</p>

    <div class="w-full max-w-2xl mb-8">
      <form id="intent-form" class="flex flex-col md:flex-row gap-2 bg-[#FAFAFA] p-2 rounded-2xl border border-[#E5E5E5] shadow-sm transition-all focus-within:border-brand focus-within:bg-white">
        <input id="task-input" type="text" placeholder="e.g. 下周一交重构代码，顺便把花呗还了，今晚洗水杯..." class="w-full px-4 py-3 bg-transparent text-sm md:text-base outline-none text-[#111] placeholder-[#999]" required>
        <button id="submit-btn" type="submit" class="bg-brand hover:bg-[#0052CC] text-white font-medium px-6 py-3 rounded-xl transition shadow-sm text-sm shrink-0 flex items-center justify-center gap-1">
          <span id="btn-text">注入引力场</span>
          <svg id="btn-arrow" class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14 5l7 7m0 0l-7 7m7-7H3"></path></svg>
          <svg id="btn-spinner" class="w-4 h-4 animate-spin hidden" fill="none" stroke="currentColor" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10" stroke-width="3" stroke-opacity="0.25"></circle><path stroke-linecap="round" stroke-width="3" d="M12 2a10 10 0 0 1 7 2.9"></path></svg>
        </button>
      </form>
    </div>

    <div class="w-full grid grid-cols-1 lg:grid-cols-3 gap-6 items-stretch min-h-[600px] mb-8">
      <div class="lg:col-span-2 border border-[#E5E5E5] rounded-3xl p-6 bg-white shadow-sm flex flex-col relative overflow-hidden">
        <div class="flex justify-between items-center mb-2 z-10">
          <span class="text-xs font-bold text-[#999] tracking-wider uppercase">连续二维映射矩阵</span>
          <span class="text-xs text-[#999]">X: 紧急度 [-100, 100] | Y: 重要度 [-100, 100]</span>
        </div>
        <div id="quadrant-chart" class="w-full flex-grow min-h-[550px]"></div>
      </div>

      <div class="border border-[#E5E5E5] rounded-3xl p-6 bg-[#FAFAFA]/50 flex flex-col justify-between text-left h-full max-h-[600px]">
        <div>
          <div class="flex justify-between items-center mb-4">
            <h3 class="text-sm font-bold text-[#111] tracking-tight">推演流与动态队列</h3>
            <span id="task-count" class="text-xs bg-white border border-[#E5E5E5] px-2 py-0.5 rounded-full font-bold text-brand">活跃</span>
          </div>
          <div id="task-list" class="flex flex-col gap-3 overflow-y-auto max-h-[400px] pr-1"></div>
        </div>
        <div class="pt-4 border-t border-[#E5E5E5] text-center">
          <button onclick="resetData()" class="text-xs text-[#999] hover:text-[#111] transition underline decoration-dotted">恢复出厂默认黄金测试集</button>
        </div>
      </div>
    </div>
  </main>

  <script type="module">
    // ═══════════════════════════════════════════
    //  全局凭证与本地存储挂载
    // ═══════════════════════════════════════════
    const API_KEY      = 'sk-b01a576a7f7c43e9b3cb7c9437cfee00';
    const API_ENDPOINT = 'https://api.deepseek.com/chat/completions';
    const MODEL_NAME   = 'deepseek-reasoner'; 
    const STORAGE_KEY  = 'gravity_quadrant_persistent_tasks';

    // 引入 Tauri 底层系统操控接口 (兼容纯净 ES 模块注入)
    const { getCurrentWindow } = window.__TAURI__ ? window.__TAURI__.window : { getCurrentWindow: () => ({ hide: () => console.log('非客户端环境: 触发隐藏'), show: () => {}, setFocus: () => {} }) };
    
    // ═══════════════════════════════════════════
    //  幽灵状态机特权钩子 (OS级交互增强)
    // ═══════════════════════════════════════════
    const appWindow = getCurrentWindow();
    const taskInput = document.getElementById('task-input');

    // 特权一：监听 Esc 键瞬间战术隐退
    window.addEventListener('keydown', (e) => {
      if (e.key === 'Escape') {
        appWindow.hide();
      }
    });

    // 特权二：视窗重现时，光标全自动防抖聚焦
    window.addEventListener('focus', () => {
      setTimeout(() => taskInput.focus(), 50);
    });

    // 特权三：动态注册系统级全局召唤快捷键 (Alt+Space / ⌥+Space)
    if (window.__TAURI__ && window.__TAURI__.globalShortcut) {
      window.__TAURI__.globalShortcut.register('Alt+Space', () => {
        appWindow.show();
        appWindow.setFocus();
      }).catch(err => console.warn("快捷键通道已被占用或未激活:", err));
    }

    // ═══════════════════════════════════════════
    //  核心提示词逻辑标尺
    // ═══════════════════════════════════════════
    const SYSTEM_PROMPT = `你是 Gravity Quadrant（引力象限）AI 推理引擎。你的唯一任务是将用户输入的混乱日常口语/流水账文本，解耦为独立任务项，并对每个任务在连续二维坐标系 [X: 紧急度, Y: 重要度] 中进行精准引力落盘。

## 坐标系定义
- X 轴 紧急度 [-100, 100]，正=紧急，负=舒缓
- Y 轴 重要度 [-100, 100]，正=重要，负=沉底

## 认知阻力 load 评级（1-5 整数）
1 = 极低（< 2min，零思考） | 5 = 极高（深度决策或阻塞）

## 趋势标记 trend 判定规则
"stable"、"escalating"、"closing_window"、"do_it_now"

## 输出严格约束
强制返回纯 JSON 格式对象，根节点必须包含 tasks 数组，绝对不要吐出 Markdown 标记或多余解释。结构示例：
{"tasks": [{"task": "简练摘要","reasoning": "思维推导链说明","x": 0, "y": 0,"load": 3,"blocks": [],"confidence": 0.9,"trend": "stable","color": "#1E88E5","category": "Work"}]}`;

    const defaultGoldData = [
      { "id": 1, "task": "转账下季度房租与水费", "reasoning": "明天上午截止紧迫性高；涉及居住权违约麻烦，触发风险防御提权", "x": 55, "y": 65, "load": 3, "blocks": [], "confidence": 1.0, "trend": "stable", "color": "#E53935", "category": "Life" },
      { "id": 2, "task": "核心算法模块重构代码", "reasoning": "下周一交付初版；决定底层业务系统核心能力上限，高阶主线产出", "x": 25, "y": 75, "load": 5, "blocks": ["联调阻塞"], "confidence": 0.9, "trend": "escalating", "color": "#1E88E5", "category": "Work" },
      { "id": 3, "task": "去柜台解封银行卡账户", "reasoning": "距离实体银行关门不足2小时，触发硬性营业窗口收束规则", "x": 85, "y": 80, "load": 4, "blocks": [], "confidence": 1.0, "trend": "closing_window", "color": "#FB8C00", "category": "Finance" },
      { "id": 4, "task": "顺手洗干净桌上水杯", "reasoning": "预计耗时<2分钟极低阻力独立动作，触发GTD两分钟原则倡导即刻清掉", "x": 90, "y": -15, "load": 1, "blocks": [], "confidence": 1.0, "trend": "do_it_now", "color": "#43A047", "category": "Life" }
    ];

    function loadPersistentMemory() {
      try { const cached = localStorage.getItem(STORAGE_KEY); if (cached) return JSON.parse(cached); } catch (e) {}
      return [...defaultGoldData];
    }
    function savePersistentMemory() { try { localStorage.setItem(STORAGE_KEY, JSON.stringify(taskData)); } catch (e) {} }

    let taskData = loadPersistentMemory();
    const chartDom = document.getElementById('quadrant-chart');
    const myChart = echarts.init(chartDom);

    function renderQuadrant(isDragging = false) {
      const normalPoints = [], effectPoints = [];
      taskData.forEach(item => {
        const pointConfig = { name: item.task, value: [item.x, item.y, item.load, item.confidence, item.reasoning, item.category, item.trend, item.task, item.id], itemStyle: { color: item.color, opacity: item.confidence < 0.7 ? 0.4 : 0.9, shadowBlur: item.y >= 50 ? 14 : 0, shadowColor: item.color } };
        if (item.trend === 'escalating' || item.trend === 'do_it_now') effectPoints.push(pointConfig); else normalPoints.push(pointConfig);
      });

      myChart.setOption({
        animation: !isDragging, grid: { left: '1%', right: '3%', top: '5%', bottom: '2%', containLabel: true },
        tooltip: { trigger: 'item', backgroundColor: '#0B0F19', borderColor: '#222', borderWidth: 1, padding: [12, 16], textStyle: { color: '#fff', fontFamily: 'Inter' }, formatter: p => `<div style="max-w:240px;white-space:normal;"><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px;"><span style="background:${p.color};color:#fff;font-size:10px;font-weight:800;padding:2px 6px;border-radius:4px;">${p.value[5]}</span><span style="color:#888;font-size:11px;">置信度 ${p.value[3]}</span></div><div style="font-weight:800;font-size:13px;line-height:1.3;margin-bottom:4px;color:#fff;">${p.value[7]}</div><div style="color:#aaa;font-size:11px;line-height:1.4;margin-bottom:8px;">${p.value[4]}</div></div>` },
        xAxis: { type: 'value', min: -100, max: 100, axisLine: { lineStyle: { color: '#E5E5E5' }, symbol: ['none', 'arrow'], symbolSize: [6, 10] }, axisLabel: { color: '#999', fontSize: 10, formatter: val => val === 90 ? '紧急 →' : (val === -90 ? '← 舒缓' : '') }, splitLine: { lineStyle: { color: '#F4F4F4', type: 'dashed' } } },
        yAxis: { type: 'value', min: -100, max: 100, axisLine: { lineStyle: { color: '#E5E5E5' }, symbol: ['none', 'arrow'], symbolSize: [6, 10] }, axisLabel: { color: '#999', fontSize: 10, formatter: val => val === 90 ? '重要 ↑' : (val === -90 ? '沉底 ↓' : '') }, splitLine: { lineStyle: { color: '#F4F4F4', type: 'dashed' } } },
        series: [
          { type: 'scatter', data: normalPoints, cursor: 'move', symbolSize: d => d[2] * 8 + 12, label: { show: true, position: 'top', distance: 6, formatter: p => p.value[1] > 40 ? p.value[7].substring(0, 6) + '..' : '', color: '#555', fontSize: 10, fontWeight: 600 } },
          { type: 'effectScatter', data: effectPoints, cursor: 'move', symbolSize: d => d[2] * 8 + 12, showEffectOn: 'render', rippleEffect: { brushType: 'stroke', scale: 3.5 }, label: { show: true, position: 'right', distance: 8, formatter: p => p.value[7].substring(0, 8), color: '#111', fontSize: 11, fontWeight: 800 } }
        ]
      });
      if (!isDragging) renderRightPanel();
    }

    function renderRightPanel() {
      const listContainer = document.getElementById('task-list');
      document.getElementById('task-count').innerText = `${taskData.length} 活跃点`;
      listContainer.innerHTML = '';
      if (taskData.length === 0) { listContainer.innerHTML = `<div class="text-center py-12 text-sm text-[#999]">象限已绝对清空，进入深度心智极简态。</div>`; return; }
      [...taskData].sort((a, b) => (b.y + b.x) - (a.y + a.x)).forEach(item => {
        listContainer.insertAdjacentHTML('beforeend', `<div class="bg-white p-3.5 rounded-2xl border border-[#E5E5E5] shadow-2xs flex flex-col justify-between gap-2 hover:border-brand transition group"><div class="flex justify-between items-start gap-2"><div class="flex items-center gap-2"><span class="w-2.5 h-2.5 rounded-full shrink-0" style="background:${item.color}"></span><span class="font-bold text-xs text-[#111] line-clamp-1 group-hover:text-brand transition">${item.task}</span></div></div><p class="text-[11px] text-[#777] leading-relaxed line-clamp-2">${item.reasoning}</p><div class="flex justify-between items-center pt-1 mt-1 border-t border-[#F4F4F4]"><span class="text-[10px] text-[#999]">坐标系 [X:${item.x}, Y:${item.y}]</span><button onclick="window.completeTask(${item.id})" class="text-[11px] font-bold text-brand hover:text-white hover:bg-brand px-2 py-0.5 rounded transition">消灭完成 ✓</button></div></div>`);
      });
    }

    function setButtonLoading(isLoading) {
      document.getElementById('btn-text').textContent = isLoading ? '推理引擎计算中...' : '注入引力场';
      document.getElementById('btn-arrow').classList.toggle('hidden', isLoading);
      document.getElementById('btn-spinner').classList.toggle('hidden', !isLoading);
      document.getElementById('submit-btn').disabled = isLoading;
      document.getElementById('submit-btn').classList.toggle('opacity-60', isLoading);
    }

    // 上帝之手：极致帧率优化的散点拖拽引擎
    let draggingTaskId = null, isUpdatingFrame = false;
    myChart.on('mousedown', p => { if (p.componentType === 'series') { draggingTaskId = p.value[8]; myChart.getZr().setCursorStyle('grabbing'); } });
    myChart.getZr().on('mousemove', e => {
      if (draggingTaskId !== null && !isUpdatingFrame) {
        isUpdatingFrame = true;
        requestAnimationFrame(() => {
          const pt = myChart.convertFromPixel('grid', [e.offsetX, e.offsetY]);
          if (pt) {
            const task = taskData.find(t => t.id === draggingTaskId);
            if (task) { task.x = Math.round(Math.max(-100, Math.min(100, pt[0]))); task.y = Math.round(Math.max(-100, Math.min(100, pt[1]))); renderQuadrant(true); }
          }
          isUpdatingFrame = false;
        });
      }
    });
    window.addEventListener('mouseup', () => { if (draggingTaskId !== null) { draggingTaskId = null; myChart.getZr().setCursorStyle('default'); savePersistentMemory(); renderQuadrant(false); } });

    document.getElementById('intent-form').addEventListener('submit', async function(e) {
      e.preventDefault(); const text = taskInput.value.trim(); if (!text) return;
      setButtonLoading(true);
      try {
        const response = await fetch(API_ENDPOINT, { method: 'POST', headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${API_KEY}` }, body: JSON.stringify({ model: MODEL_NAME, response_format: { type: "json_object" }, temperature: 0.1, messages: [{ role: "system", content: SYSTEM_PROMPT }, { role: "user", content: `请推演以下任务：\n“${text}”` }] }) });
        if (!response.ok) throw new Error(`状态码: ${response.status}`);
        const cleanStr = (await response.json()).choices[0].message.content.replace(/```json/g, '').replace(/```/g, '').trim();
        const payload = JSON.parse(cleanStr);
        (Array.isArray(payload.tasks) ? payload.tasks : [payload]).forEach(t => taskData.push({ id: Date.now() + Math.floor(Math.random()*1000), task: t.task || "未命名", reasoning: t.reasoning || "", x: Number(t.x)||0, y: Number(t.y)||0, load: Number(t.load)||3, blocks: t.blocks||[], confidence: Number(t.confidence)||0.9, trend: t.trend||"stable", color: t.color||"#1E88E5", category: t.category||"Dynamic" }));
        taskInput.value = ''; savePersistentMemory(); renderQuadrant();
        
        // 特权四：注入成功后，自动触发隐身，做到深藏功与名
        setTimeout(() => appWindow.hide(), 400); 

      } catch (err) { alert(`引力场联调失败: ${err.message}`); } finally { setButtonLoading(false); }
    });

    // 挂载全局方法供行内 onclick 调用
    window.completeTask = id => { taskData = taskData.filter(t => t.id !== id); savePersistentMemory(); renderQuadrant(); };
    window.resetData = () => { taskData = [...defaultGoldData]; savePersistentMemory(); renderQuadrant(); };
    window.addEventListener('resize', () => myChart.resize());
    renderQuadrant();
  </script>
</body>
</html>
